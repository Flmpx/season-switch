<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>场景设置</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="popup">
      <header class="popup-header">
        <h1>季节轮转</h1>
      </header>

      <main class="popup-body">
        <!-- 季节 -->
        <section class="setting-section">
          <h2 class="section-title">季节</h2>
          <div class="option-grid" data-key="season">
            <button class="option-btn" data-value="spring">春</button>
            <button class="option-btn" data-value="summer">夏</button>
            <button class="option-btn" data-value="autumn">秋</button>
            <button class="option-btn" data-value="winter">冬</button>
            <button class="option-btn" data-value="custom-season">自定义</button>
            <button class="option-btn" data-value="system-season">跟随系统</button>
          </div>
          <div class="custom-row" id="customMonthRow" style="display:none;">
            <input
              type="range"
              id="customMonthSlider"
              min="1"
              max="12"
              value="6"
              class="intensity-slider"
            />
            <span id="customMonthValue" class="intensity-value">6月</span>
          </div>
        </section>

        <!-- 时间 -->
        <section class="setting-section">
          <h2 class="section-title">时间</h2>
          <div class="option-grid" data-key="timeOfDay">
            <button class="option-btn" data-value="dawn">清晨</button>
            <button class="option-btn" data-value="morning">上午</button>
            <button class="option-btn" data-value="noon">中午</button>
            <button class="option-btn" data-value="afternoon">下午</button>
            <button class="option-btn" data-value="dusk">傍晚</button>
            <button class="option-btn" data-value="evening">晚上</button>
            <button class="option-btn" data-value="midnight">深夜</button>
            <button class="option-btn" data-value="custom-time">自定义</button>
            <button class="option-btn" data-value="system-time">跟随系统</button>
          </div>
          <div class="custom-row" id="customHourRow" style="display:none;">
            <input
              type="range"
              id="customHourSlider"
              min="0"
              max="23"
              value="12"
              class="intensity-slider"
            />
            <span id="customHourValue" class="intensity-value">12时</span>
          </div>
        </section>

        <!-- 显示程度 -->
        <section class="setting-section">
          <h2 class="section-title">显示程度</h2>
          <div class="option-grid" data-key="intensity">
            <button class="option-btn" data-value="misty">朦朦</button>
            <button class="option-btn" data-value="light">浅</button>
            <button class="option-btn" data-value="medium">中</button>
            <button class="option-btn" data-value="deep">深</button>
            <button class="option-btn" data-value="custom-intensity">自定义</button>
          </div>
          <div class="custom-intensity-row" id="customIntensityRow" style="display:none;">
            <input
              type="range"
              id="customIntensitySlider"
              min="0"
              max="100"
              value="50"
              class="intensity-slider"
            />
            <span id="customIntensityValue" class="intensity-value">50%</span>
          </div>
        </section>

        <!-- 粒子 -->
        <section class="setting-section">
          <h2 class="section-title">粒子</h2>

          <!-- 粒子数目 -->
          <div class="sub-setting">
            <h3 class="sub-title">粒子数目</h3>
            <div class="option-grid" data-key="particleCount">
              <button class="option-btn" data-value="minimal">微量</button>
              <button class="option-btn" data-value="few">少量</button>
              <button class="option-btn" data-value="medium">中等</button>
              <button class="option-btn" data-value="heavy">大量</button>
              <button class="option-btn" data-value="custom-particle">自定义</button>
            </div>
            <div class="custom-row" id="customParticleRow" style="display:none;">
              <input
                type="range"
                id="customParticleSlider"
                min="10"
                max="1800"
                value="50"
                class="intensity-slider"
              />
              <span id="customParticleValue" class="intensity-value">50个/分钟</span>
            </div>
          </div>

          <!-- 粒子大小 -->
          <div class="sub-setting">
            <h3 class="sub-title">粒子大小</h3>
            <div class="option-grid" data-key="particleSize">
              <button class="option-btn" data-value="small">小</button>
              <button class="option-btn" data-value="medium">中</button>
              <button class="option-btn" data-value="large">大</button>
              <button class="option-btn" data-value="custom-size">自定义</button>
            </div>
            <div class="custom-row" id="customParticleSizeRow" style="display:none;">
              <input
                type="range"
                id="customParticleSizeSlider"
                min="0"
                max="100"
                value="50"
                class="intensity-slider"
              />
              <span id="customParticleSizeValue" class="intensity-value">50%</span>
            </div>
          </div>
        </section>
      </main>
    </div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
